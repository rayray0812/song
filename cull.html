<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>刷歌頁面</title>
  <link rel="stylesheet" href="styles.css?v=20260512-closed2" />
</head>

<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>刷歌頁面</h1>
      </div>
      <div class="header-actions">
        <a class="ghost-link" href="index.html">回報歌</a>
      </div>
    </header>

    <section class="panel" id="gatePanel">
      <div class="section-title">
        <h2>輸入通關密語</h2>
        <p id="gateStatus">😊只有總教知道的密碼</p>
      </div>
      <form id="gateForm" autocomplete="off">
        <label class="field">
          <span>通關密語</span>
          <input id="passphraseInput" type="password" placeholder="輸入密語" required />
        </label>
        <button class="primary-button" type="submit">進入</button>
      </form>
    </section>

    <nav class="cull-tabs is-locked" id="cullTabs" role="tablist" aria-label="刷歌頁面">
      <button class="cull-tab-button is-active" type="button" role="tab" data-cull-tab="cull"
        aria-selected="true">刷歌</button>
      <button class="cull-tab-button" type="button" role="tab" data-cull-tab="schedule"
        aria-selected="false">排程</button>
      <button class="cull-tab-button" type="button" role="tab" data-cull-tab="stats" aria-selected="false">統計</button>
    </nav>

    <section class="panel cull-panel is-locked" data-cull-section="cull" id="reportingControlPanel">
      <div class="section-title">
        <div>
          <h2>報歌狀態</h2>
          <p id="reportingStatusText">載入中…</p>
        </div>
        <button class="primary-button" id="toggleReportingButton" type="button" disabled>—</button>
      </div>
    </section>

    <section class="panel cull-panel is-locked" data-cull-section="cull" id="cullPanel">
      <div class="section-title">
        <div>
          <h2>目前歌單</h2>
          <p id="syncStatus">尚未連線</p>
        </div>
        <p class="count-badge" id="cullCount">0 / 0 通過</p>
      </div>

      <div class="cull-list" id="cullList"></div>
    </section>

    <section class="panel cull-panel is-locked" data-cull-section="schedule" id="schedulePanel">
      <div class="section-title">
        <div>
          <h2>評鑑排程</h2>
        </div>
      </div>
      <label class="field schedule-start-field">
        <span>開始時間</span>
        <input id="scheduleStart" type="time" />
      </label>
      <div class="schedule-list" id="scheduleList"></div>
      <div class="form-actions schedule-actions">
        <button class="primary-button" id="copyScheduleButton" type="button">複製排程</button>
        <button class="primary-button live-enter-button" id="enterLiveModeButton" type="button">進入評鑑模式</button>
      </div>
    </section>

    <div class="live-mode" id="liveMode" hidden>
      <header class="live-header">
        <span class="live-eval-tag" id="liveEvalTag">一評</span>
        <span class="live-clock" id="liveClock">--:--</span>
        <button class="ghost-button live-exit-button" id="exitLiveModeButton" type="button">離開</button>
      </header>

      <main class="live-body">
        <section class="live-current-section">
          <span class="live-label">正在評鑑</span>
          <h2 class="live-current-title" id="liveCurrentTitle">—</h2>
          <div class="live-current-people" id="liveCurrentPeople"></div>
        </section>

        <section class="live-lyrics-section" id="liveLyricsSection" hidden>
          <details class="live-lyrics-details" open>
            <summary>歌詞</summary>
            <div class="live-lyrics-content" id="liveLyricsContent"></div>
          </details>
        </section>

        <section class="live-timers">
          <div class="live-timer is-primary" id="liveSongTimer">
            <span class="live-timer-label">這首剩</span>
            <span class="live-timer-value" id="liveSongRemaining">--:--</span>
            <button class="live-start-button" id="liveStartButton" type="button">▶ 開始</button>
          </div>
          <div class="live-timer">
            <span class="live-timer-label">拖到</span>
            <span class="live-timer-value" id="liveDelay">--:--</span>
          </div>
        </section>

        <section class="live-next-section">
          <span class="live-label">下一首</span>
          <div class="live-next-title" id="liveNextTitle">—</div>
        </section>

        <section class="live-chat-section">
          <div class="live-chat-head">
            <span class="live-label">鋭評一下</span>
            <label class="live-author-field">
              <span>你是</span>
              <input id="liveAuthorInput" type="text" placeholder="輸入名字" autocomplete="off" />
            </label>
          </div>
          <div class="live-chat-messages" id="liveChatMessages"></div>
        </section>
      </main>

      <footer class="live-footer">
        <form class="live-chat-form" id="liveChatForm" autocomplete="off">
          <input id="liveChatInput" type="text" placeholder="輸入評語..." autocomplete="off" />
          <button class="primary-button live-send-button" type="submit">傳</button>
        </form>
        <div class="live-nav-actions">
          <button class="live-prev-button" id="livePrevButton" type="button" aria-label="上一首">◀</button>
          <button class="primary-button live-next-button" id="liveNextButton" type="button">下一首 ▶</button>
        </div>
      </footer>

      <div class="live-celebration" id="liveCelebration" hidden>
        <div class="celebration-fireworks" id="celebrationFireworks" aria-hidden="true"></div>
        <div class="celebration-confetti" id="celebrationConfetti" aria-hidden="true"></div>
        <div class="celebration-content">
          <div class="celebration-emoji">🎉</div>
          <h2 class="celebration-title">評鑑結束</h2>
          <p class="celebration-subtitle" id="celebrationSubtitle">辛苦了</p>
          <button class="primary-button celebration-exit-button" id="celebrationExitButton" type="button">離開評鑑模式</button>
        </div>
      </div>
    </div>

    <section class="panel cull-panel is-locked" data-cull-section="stats" id="cullStatsPanel">
      <div class="section-title">
        <h2>剩餘統計</h2>
      </div>
      <div class="cull-stats" id="cullStats"></div>
    </section>

    <section class="panel cull-panel is-locked" data-cull-section="stats" id="copyPanel">
      <div class="section-title">
        <h2>複製結果</h2>
      </div>
      <button class="primary-button" id="copyPassedButton" type="button">複製通過歌單</button>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"
    integrity="sha384-2zrRDgDHSYB/GN3nFW3fsZXoxEhKIr3N2h63Tc6DEOB9JJdFIu8xMJT2Cph/gBil"
    crossorigin="anonymous"></script>
  <script src="supabase-config.js?v=20260512-closed2"></script>
  <script src="cull.js?v=20260512-closed2"></script>
</body>

</html>
