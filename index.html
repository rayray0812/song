<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>樂研大成報歌</title>
  <link rel="stylesheet" href="styles.css?v=20260510-dnd" />
</head>

<body>
  <main class="app">
    <section class="countdown-banner" aria-label="評選倒數">
      <div class="countdown-bg" aria-hidden="true">
        <span class="countdown-sparkle">♪</span>
        <span class="countdown-sparkle">♫</span>
        <span class="countdown-sparkle">♬</span>
        <span class="countdown-sparkle">♩</span>
        <span class="countdown-sparkle">♪</span>
        <span class="countdown-sparkle">♫</span>
      </div>
      <article class="countdown-card is-mini" data-eval="1" data-target="2026-05-17T00:00:00+08:00" aria-live="polite">
        <span class="countdown-tag">一評</span>
        <span class="countdown-date">5 / 17</span>
        <span class="cd-mini-days"><span class="cd-num" data-unit="days">--</span><span
            class="cd-suffix">天</span></span>
      </article>
      <article class="countdown-card is-mini" data-eval="2" data-target="2026-05-27T00:00:00+08:00" aria-live="polite">
        <span class="countdown-tag">二評</span>
        <span class="countdown-date">5 / 27</span>
        <span class="cd-mini-days"><span class="cd-num" data-unit="days">--</span><span
            class="cd-suffix">天</span></span>
      </article>
      <article class="countdown-card is-primary" data-target="2026-06-13T00:00:00+08:00">
        <div class="countdown-card-head">
          <span class="countdown-tag">大成</span>
          <span class="countdown-date">6 / 13</span>
        </div>
        <div class="countdown-days" aria-live="polite">
          <span class="cd-prefix">還剩</span>
          <span class="cd-num" data-unit="days">--</span>
          <span class="cd-suffix">天</span>
        </div>
        <div class="countdown-detail">
          <span class="cd-mini"><span class="cd-mini-num" data-unit="hours">--</span><span
              class="cd-mini-label">時</span></span>
          <span class="cd-mini"><span class="cd-mini-num" data-unit="minutes">--</span><span
              class="cd-mini-label">分</span></span>
          <span class="cd-mini"><span class="cd-mini-num" data-unit="seconds">--</span><span
              class="cd-mini-label">秒</span></span>
        </div>
        <div class="countdown-progress" aria-hidden="true"><span class="countdown-progress-fill"></span></div>
      </article>
    </section>

    <header class="topbar">
      <div>
        <p class="eyebrow">這樣還可以打錯名字的話就刷掉</p>
        <h1>大成報歌</h1>
      </div>
      <div class="header-actions">
        <a class="ghost-link" href="cull.html">刷歌</a>
        <button class="ghost-button" id="exportButton" type="button">匯出</button>
        <button class="ghost-button" id="excelExportButton" type="button">Excel</button>
      </div>
    </header>

    <section class="panel submissions-closed-banner" id="submissionsClosedBanner" hidden>
      <div class="closed-banner-body">
        <h2>🔒 報歌已截止</h2>
        <p>總教已關閉報歌，目前無法報歌。下方仍可查看現有歌單與編輯。</p>
      </div>
    </section>

    <section class="panel" id="formPanel">
      <div class="section-title">
      </div>

      <div id="formHost">
        <form id="songForm" autocomplete="off">
          <label class="field">
            <span>歌名</span>
            <input id="songTitle" name="title" type="text" placeholder="輸入歌名" required />
          </label>

          <div class="credit-grid">
            <section class="credit-group" data-credit="arranger">
              <div class="credit-heading">
                <h3>編曲</h3>
                <button class="add-credit-button" type="button" data-credit="arranger" aria-label="新增編曲">+</button>
              </div>
              <div class="credit-inputs"></div>
            </section>
            <section class="credit-group" data-credit="composer">
              <div class="credit-heading">
                <h3>作曲</h3>
                <button class="add-credit-button" type="button" data-credit="composer" aria-label="新增作曲">+</button>
              </div>
              <div class="credit-inputs"></div>
            </section>
            <section class="credit-group" data-credit="lyricist">
              <div class="credit-heading">
                <h3>作詞</h3>
                <button class="add-credit-button" type="button" data-credit="lyricist" aria-label="新增作詞">+</button>
              </div>
              <div class="credit-inputs"></div>
            </section>
          </div>

          <label class="field">
            <span>歌詞</span>
            <textarea id="lyrics" name="lyrics" rows="5" placeholder="輸入歌詞，純音樂不用填"></textarea>
          </label>

          <div class="role-grid" id="roleFields"></div>

          <div class="form-actions">
            <button class="primary-button" id="submitButton" type="submit">報歌</button>
            <button class="ghost-button" id="resetButton" type="reset">清空</button>
          </div>
        </form>
      </div>
    </section>

    <section class="panel results-panel">
      <div class="tabs" role="tablist" aria-label="報歌資料">
        <button class="tab-button is-active" type="button" role="tab" aria-selected="true"
          data-tab="songs">目前報歌</button>
        <button class="tab-button" type="button" role="tab" aria-selected="false" data-tab="stats">人員統計</button>
      </div>

      <div class="tab-view is-active" id="songsView" data-view="songs">
        <div class="section-title">
          <h2>目前報歌</h2>
          <p class="count-badge" id="songCount">0 首歌</p>
        </div>

        <label class="field">
          <span>搜尋歌名或歌詞</span>
          <input id="songSearch" type="search" placeholder="輸入歌名或歌詞關鍵字" />
        </label>

        <label class="field">
          <span>依人員篩選</span>
          <select id="personFilter">
            <option value="">全部顯示</option>
          </select>
        </label>

        <div class="song-list" id="songList"></div>
      </div>

      <div class="tab-view" id="statsView" data-view="stats">
        <div class="section-title">
          <h2>人員統計</h2>
          <div class="stats-controls">
            <label class="sort-field">
              <span>樂器</span>
              <select id="statsInstrument">
                <option value="">全部</option>
              </select>
            </label>
            <label class="sort-field">
              <span>排序</span>
              <select id="statsSort">
                <option value="desc">由多到少</option>
                <option value="asc">由少到多</option>
              </select>
            </label>
          </div>
        </div>
        <div class="stats-chart" id="statsList"></div>
      </div>
    </section>
  </main>

  <template id="roleGroupTemplate">
    <section class="role-group">
      <div class="role-group-heading">
        <h3></h3>
        <button class="add-role-button" type="button" aria-label="新增欄位">+</button>
      </div>
      <div class="role-inputs"></div>
    </section>
  </template>

  <template id="personInputTemplate">
    <div class="input-row">
      <label class="field role-field">
        <span></span>
        <input class="person-input member-picker-input" type="text" data-picker="performer" placeholder="點選或輸入姓名" />
      </label>
      <button class="remove-role-button" type="button" aria-label="移除欄位">-</button>
    </div>
  </template>

  <template id="creditInputTemplate">
    <div class="input-row credit-row">
      <label class="field role-field">
        <span>人員</span>
        <input class="credit-person-input member-picker-input" type="text" data-picker="credit" placeholder="點選或輸入姓名" />
      </label>
      <button class="remove-credit-button" type="button" aria-label="移除欄位">-</button>
    </div>
  </template>

  <template id="otherInputTemplate">
    <div class="other-row">
      <label class="field role-field">
        <span>樂器</span>
        <input class="other-role-input" type="text" placeholder="例如：小提琴、和聲" />
      </label>
      <label class="field role-field">
        <span>人員</span>
        <input class="person-input member-picker-input" type="text" data-picker="performer" placeholder="點選或輸入姓名" />
      </label>
      <button class="remove-role-button" type="button" aria-label="移除欄位">-</button>
    </div>
  </template>

  <dialog class="lyrics-dialog" id="lyricsDialog">
    <div class="dialog-heading">
      <h2 id="lyricsDialogTitle">歌詞</h2>
      <button class="ghost-button dialog-close" id="lyricsDialogClose" type="button" aria-label="關閉">關閉</button>
    </div>
    <div class="lyrics dialog-lyrics" id="lyricsDialogContent"></div>
  </dialog>

  <dialog class="edit-dialog" id="editDialog">
    <div class="dialog-heading">
      <h2>編輯報歌</h2>
      <button class="ghost-button dialog-close" id="editDialogClose" type="button" aria-label="關閉">關閉</button>
    </div>
    <div class="edit-dialog-body" id="editFormHost"></div>
  </dialog>

  <dialog class="confirm-dialog" id="deleteDialog">
    <div class="confirm-dialog-body">
      <h2>😡不要亂刪別人的歌</h2>
      <p id="deleteDialogText">真的要刪嗎？</p>
      <div class="form-actions confirm-actions">
        <button class="delete-button" id="confirmDeleteButton" type="button">確認刪除</button>
        <button class="ghost-button" id="cancelDeleteButton" type="button">取消</button>
      </div>
    </div>
  </dialog>

  <dialog class="member-dialog" id="memberDialog">
    <div class="dialog-heading">
      <h2 id="memberDialogTitle">選擇人員</h2>
      <button class="ghost-button dialog-close" id="memberDialogClose" type="button" aria-label="關閉">關閉</button>
    </div>
    <div class="member-dialog-body">
      <input id="memberSearch" type="search" placeholder="搜尋姓名" />
      <div class="member-options" id="memberOptions"></div>
    </div>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/lucide@0.469.0/dist/umd/lucide.min.js"
    integrity="sha384-hJnF5AwidE18GSWTAGHv3ByzzvfNZ1Tcx5y1UUV3WkauuMCEzBJBMSwSt/PUPXnM"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"
    integrity="sha384-vtjasyidUo0kW94K5MXDXntzOJpQgBKXmE7e2Ga4LG0skTTLeBi97eFAXsqewJjw"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"
    integrity="sha384-2zrRDgDHSYB/GN3nFW3fsZXoxEhKIr3N2h63Tc6DEOB9JJdFIu8xMJT2Cph/gBil"
    crossorigin="anonymous"></script>
  <script src="supabase-config.js?v=20260510-dnd"></script>
  <script src="app.js?v=20260510-dnd"></script>
  <script src="countdown.js?v=20260510-dnd"></script>
</body>

</html>
